<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ForceProxy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #f5f5f5;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      padding: 11px 14px;
      background: #1a73e8;
      color: #fff;
    }
    header h1 { font-size: 15px; font-weight: 600; flex: 1; }

    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: background 0.2s;
    }
    .dot.active { background: #81c995; }

    /* ── Proxy list ── */
    #proxy-list { background: #fff; border-bottom: 1px solid #e0e0e0; }

    .proxy-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.15s;
    }
    .proxy-row:hover { background: #f0f4ff; }
    .proxy-row.active {
      border-left-color: #1a73e8;
      background: #e8f0fe;
    }
    .proxy-row + .proxy-row { border-top: 1px solid #f0f0f0; }

    /* custom radio dot */
    .radio-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid #bbb;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .proxy-row.active .radio-dot {
      border-color: #1a73e8;
    }
    .radio-dot::after {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: transparent;
      transition: background 0.15s;
    }
    .proxy-row.active .radio-dot::after { background: #1a73e8; }

    .proxy-info { flex: 1; min-width: 0; }
    .proxy-info .label {
      font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .proxy-info .addr {
      font-size: 11px; color: #888; margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .btn-delete {
      flex-shrink: 0;
      background: none; border: none;
      color: #bbb; font-size: 16px; line-height: 1;
      cursor: pointer; padding: 2px 4px; border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }
    .btn-delete:hover { color: #c5221f; background: #fce8e6; }

    .btn-edit {
      flex-shrink: 0;
      background: none; border: none;
      color: #bbb; font-size: 13px; line-height: 1;
      cursor: pointer; padding: 2px 4px; border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }
    .btn-edit:hover { color: #1a73e8; background: #e8f0fe; }

    /* ── Add form ── */
    .add-section { padding: 12px 14px; background: #fff; }

    .add-title {
      font-size: 11px; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .field { margin-bottom: 6px; }
    .field label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; }

    input[type="text"], input[type="number"], select {
      width: 100%; padding: 5px 7px;
      border: 1px solid #ccc; border-radius: 4px;
      font-size: 12px; outline: none; background: #fff;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #1a73e8; }

    .host-row { display: flex; gap: 6px; }
    .host-row input[type="text"] { flex: 1; }
    .host-row input[type="number"] { width: 68px; flex-shrink: 0; }

    .add-footer {
      display: flex; justify-content: flex-end;
      margin-top: 8px;
    }

    #btn-add {
      padding: 6px 14px;
      background: #1a73e8; color: #fff;
      border: none; border-radius: 4px;
      font-size: 12px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    #btn-add:hover { background: #1558b0; }

    /* ── Status bar ── */
    .status-bar {
      font-size: 11px; text-align: center; color: #888;
      padding: 5px 14px; min-height: 22px;
      background: #f5f5f5;
    }
    .status-bar.ok  { color: #188038; }
    .status-bar.err { color: #c5221f; }
  </style>
</head>
<body>
  <header>
    <h1>ForceProxy</h1>
    <div class="dot" id="dot"></div>
  </header>

  <div id="proxy-list"></div>

  <div class="add-section">
    <div class="add-title">Add proxy</div>

    <div class="field">
      <label>Label</label>
      <input type="text" id="new-label" placeholder="e.g. Amsterdam">
    </div>
    <div class="field">
      <label>Type</label>
      <select id="new-type">
        <option value="socks5" selected>SOCKS5</option>
        <option value="http">HTTP</option>
        <option value="https">HTTPS</option>
      </select>
    </div>
    <div class="field">
      <label>Host : Port</label>
      <div class="host-row">
        <input type="text"   id="new-host" placeholder="127.0.0.1" spellcheck="false" autocomplete="off">
        <input type="number" id="new-port" placeholder="1080" min="1" max="65535">
      </div>
    </div>

    <div class="add-footer">
      <button id="btn-add">+ Add</button>
    </div>
  </div>

  <div class="status-bar" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
